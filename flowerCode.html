  <style>
    /* Welcome Modal Styles */
    #welcome-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    #welcome-modal.hidden {
      display: none;
    }

    .welcome-content {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 50px 60px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      animation: slideDown 0.5s ease-out;
    }

    @keyframes slideDown {
      from {
        transform: translateY(-50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .welcome-content h2 {
      color: white;
      font-size: 2.5em;
      margin: 0 0 20px 0;
      font-weight: bold;
    }

    .welcome-content p {
      color: white;
      font-size: 1.2em;
      margin: 15px 0;
      line-height: 1.6;
    }

    .welcome-btn {
      background: #ff6b9d;
      color: white;
      border: none;
      padding: 15px 50px;
      font-size: 1.1em;
      border-radius: 50px;
      cursor: pointer;
      margin-top: 30px;
      font-weight: bold;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(255, 107, 157, 0.4);
    }

    .welcome-btn:hover {
      background: #ff5a8f;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 107, 157, 0.6);
    }

    .welcome-btn:active {
      transform: translateY(0);
    }

    /* Hide content until accepted */
    body.welcome-shown {
      overflow: hidden;
    }

    body.welcome-accepted #welcome-modal {
      display: none;
    }

    /* Responsive Design cho Welcome Modal */
    @media (max-width: 768px) {
      .welcome-content {
        padding: 40px 40px;
        border-radius: 16px;
      }

      .welcome-content h2 {
        font-size: 1.8em;
        margin-bottom: 15px;
      }

      .welcome-content p {
        font-size: 1em;
        margin: 12px 0;
      }

      .welcome-btn {
        padding: 12px 40px;
        font-size: 1em;
        margin-top: 20px;
      }
    }

    @media (max-width: 480px) {
      .welcome-content {
        padding: 30px 25px;
        border-radius: 12px;
      }

      .welcome-content h2 {
        font-size: 1.4em;
        margin-bottom: 10px;
      }

      .welcome-content p {
        font-size: 0.9em;
        margin: 10px 0;
      }

      .welcome-btn {
        padding: 10px 30px;
        font-size: 0.95em;
        margin-top: 15px;
      }
    }
  </style>

</head>

  <script src="flowerCode.js"></script>
  <script>
    // Function to accept gift and start animation
    function acceptGift() {
      // Hide welcome modal and show content
      document.body.classList.add('welcome-accepted');
      document.body.classList.remove('welcome-shown');
      
      // Start background music
      const audio = document.getElementById('background-music');
      audio.muted = false;
      audio.volume = 0.5;
      audio.play().catch(err => console.log('Error playing audio:', err));
